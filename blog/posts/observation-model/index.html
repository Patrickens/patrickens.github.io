<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cutting Bioreactor Scale-Up Costs | Thomas Diederen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#232120; --muted:#66615c; --line:#c7c7c7; --accent:#8f3c23; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: var(--ink); font-family: "IBM Plex Mono", monospace; }
    main { width: min(920px, 92vw); margin: 2rem auto 3rem; line-height: 1.7; }
    a { color: var(--accent); }
    img { max-width: 100%; height: auto; border: 1px solid var(--line); }
    hr { border: 0; border-top: 1px solid var(--line); margin: 1.5rem 0; }
    h1, h2, h3 { line-height: 1.3; }
    code, pre { font-family: "IBM Plex Mono", monospace; }
    pre { overflow: auto; border: 1px solid var(--line); padding: 0.7rem; background: #f7f7f7; }
    .back { display: inline-block; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../../index.html#blog">&larr; Back to blog</a>
    <article id="post">Loading post...</article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch("./blog_post.md")
      .then((res) => {
        if (!res.ok) throw new Error("Could not load blog post markdown");
        return res.text();
      })
      .then((md) => {
        document.getElementById("post").innerHTML = marked.parse(md);
      })
      .catch((err) => {
        document.getElementById("post").innerHTML = `<p>${err.message}</p>`;
      });
  </script>
</body>
</html>
